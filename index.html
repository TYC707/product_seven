<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食品二维码溯源系统</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f8fb;
      color: #222;
    }
    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      background: #0f766e;
      color: white;
      padding: 24px;
      border-radius: 14px;
      text-align: center;
    }
    .card {
      background: white;
      margin-top: 16px;
      padding: 18px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .item {
      background: #ecfdf5;
      border-radius: 12px;
      padding: 20px;
      margin: 12px 0;
      cursor: pointer;
    }
    .item:hover {
      background: #dcfce7;
    }
    .item h2 {
      margin: 0 0 8px;
      color: #166534;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>食品二维码溯源系统</h1>
    </div>
    <div class="card">
      <h2>食品列表（点击查看溯源）</h2>
      <div id="list"></div>
    </div>
  </div>

  <script>
    async function init() {
      const res = await fetch('products.json');
      const products = await res.json();
      const listEl = document.getElementById('list');
      products.forEach(p => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <h2>${p.name}</h2>
          <p>产地：${p.origin} | 批次：${p.batch}</p>
        `;
        div.onclick = () => {
          window.location.href = `detail.html?id=${p.id}`;
        };
        listEl.appendChild(div);
      });
    }
    init();
  </script>
</body>
</html>
